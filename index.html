<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bộ đề Toán Tiểu học</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef5ff;
      margin: 0;
      padding: 30px;
      color: #1f2937;
    }
    .box {
      max-width: 760px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }
    a {
      display: block;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      background: #2563eb;
    }
    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Bộ đề Toán Tiểu học</h1>
    <p>Chọn lớp để làm đề ngẫu nhiên, xem dạng bài và lịch sử làm bài.</p>

    <div class="grid">
      <a href="toan-lop-2.html">Toán lớp 2</a>
      <a href="toan-lop-3.html">Toán lớp 3</a>
      <a href="toan-lop-4.html">Toán lớp 4</a>
      <a href="toan-lop-5.html">Toán lớp 5</a>
    </div>
  </div>
</body>
</html>
